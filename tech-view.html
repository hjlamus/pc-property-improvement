<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Job Details | P&C Property Improvement</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Mobile-first specific styles for tech view */
        body {
            background-color: #0f172a; /* Dark sleek background for mobile */
            color: #f8fafc;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }

        .tech-app {
            max-width: 480px;
            margin: 0 auto;
            background-color: #1e293b; /* Sleek mobile container card */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding-bottom: 2rem;
        }

        .app-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            padding: 1.5rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-header h1 {
            color: #ffffff;
            font-size: 1.15rem;
            margin: 0;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background-color: #f59e0b; /* Pending warning color */
            color: #000000;
            transition: all 0.3s ease;
        }

        .status-badge.in-progress {
            background-color: #3b82f6; /* Blue in-progress */
            color: #ffffff;
        }

        .status-badge.completed {
            background-color: #10b981; /* Green completed */
            color: #ffffff;
        }

        .app-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-grow: 1;
        }

        .info-card {
            background-color: #334155;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #475569;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }

        .info-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        .pay-value {
            font-size: 2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #10b981;
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
        }

        .pay-value span {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Navigation Buttons */
        .gps-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .gps-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            background-color: #475569;
            border: 1px solid #64748b;
            color: #ffffff;
        }

        .gps-btn.google-maps {
            background-color: #0f9d58;
            border: none;
        }

        .gps-btn.waze {
            background-color: #2ec0ff;
            color: #000000;
            border: none;
        }

        .tech-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-start {
            background-color: #2563eb;
            color: #ffffff;
        }

        .btn-start:hover {
            background-color: #3b82f6;
        }

        .btn-complete {
            background-color: #10b981;
            color: #ffffff;
            display: none;
        }

        .btn-complete:hover {
            background-color: #059669;
        }

        /* Upload files style */
        .upload-section {
            display: none;
            background-color: #334155;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #475569;
            flex-direction: column;
            gap: 0.5rem;
        }

        .upload-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }

        .custom-file-upload {
            border: 2px dashed #475569;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 500;
            transition: all 0.2s;
        }

        .custom-file-upload:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .preview-thumbnails {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #475569;
        }
    </style>
</head>
<body>

    <div class="tech-app">
        <!-- App Header -->
        <div class="app-header">
            <div>
                <h1>P&C PROPERTY</h1>
                <span style="font-size: 0.65rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Improvement LLC</span>
            </div>
            <div id="tech-status" class="status-badge">Pending</div>
        </div>

        <!-- App Body Content -->
        <div class="app-body">
            <!-- Technician Name Info -->
            <div class="info-card">
                <div class="info-label" id="lbl-tech">Technician Assigned</div>
                <div class="info-value" id="val-tech">Nelson Mendoza</div>
            </div>

            <!-- Job Address Card -->
            <div class="info-card">
                <div class="info-label" id="lbl-address">Job Address</div>
                <div class="info-value" id="val-address">456 Northside Dr NW, Atlanta, GA 30318</div>
                
                <!-- GPS Redirect buttons -->
                <div class="gps-buttons">
                    <a href="#" id="gmaps-link" class="gps-btn google-maps" target="_blank">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <span>Google Maps</span>
                    </a>
                    <a href="#" id="waze-link" class="gps-btn waze" target="_blank">
                        <span>Waze GPS</span>
                    </a>
                </div>
            </div>

            <!-- Job Payout Amount -->
            <div class="info-card">
                <div class="info-label" id="lbl-pay">Your Payout</div>
                <div class="pay-value">$<span id="val-pay">350</span> <span>USD</span></div>
            </div>

            <!-- Job Description -->
            <div class="info-card">
                <div class="info-label" id="lbl-desc">Job Details</div>
                <div class="info-value" id="val-desc" style="font-weight: 400; font-size: 0.95rem; color: #cbd5e1;">Install new drywall panels in kitchen and paint matching navy blue...</div>
            </div>

            <!-- Photo Upload Area (Rendered when In Progress) -->
            <div class="upload-section" id="upload-panel">
                <div class="upload-title" id="lbl-upload">Upload Proof of Completed Work</div>
                <label class="custom-file-upload">
                    <input type="file" id="tech-photos" multiple accept="image/*" style="display: none;">
                    <span id="lbl-choose">Take / Select Photos</span>
                </label>
                <div class="preview-thumbnails" id="tech-photo-previews"></div>
            </div>

            <!-- Action Buttons for Flow Control -->
            <div class="tech-actions">
                <button id="btn-start-job" class="action-btn btn-start">Start Job</button>
                <button id="btn-complete-job" class="action-btn btn-complete">Mark as Completed</button>
            </div>
        </div>
    </div>

    <!-- Tech View Logic -->
    <script>
        // Dictionary for mobile translations
        const mobileTranslations = {
            en: {
                "lbl-tech": "Technician Assigned",
                "lbl-address": "Job Address",
                "lbl-pay": "Your Payout",
                "lbl-desc": "Job Details",
                "lbl-upload": "Upload Proof of Completed Work",
                "lbl-choose": "Take / Select Photos",
                "btn-start": "Start Job",
                "btn-complete": "Mark as Completed",
                "status-pending": "Pending",
                "status-progress": "In Progress",
                "status-completed": "Completed",
                "alert-started": "Job started! Make sure to take pictures once complete.",
                "alert-completed": "Job complete! Photos successfully dispatched to administration."
            },
            es: {
                "lbl-tech": "Técnico Asignado",
                "lbl-address": "Dirección del Trabajo",
                "lbl-pay": "Tu Pago",
                "lbl-desc": "Detalles del Trabajo",
                "lbl-upload": "Subir Fotos del Trabajo Terminado",
                "lbl-choose": "Tomar / Elegir Fotos",
                "btn-start": "Comenzar Trabajo",
                "btn-complete": "Marcar como Completado",
                "status-pending": "Pendiente",
                "status-progress": "En Progreso",
                "status-completed": "Completado",
                "alert-started": "¡Trabajo iniciado! Toma fotos cuando finalices.",
                "alert-completed": "¡Trabajo completado! Las fotos fueron enviadas al administrador."
            }
        };

        let currentLang = 'en';

        // Parse query parameters
        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                const parts = search.split('&');
                for (let i = 0; i < parts.length; i++) {
                    const pair = parts[i].split('=');
                    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
                }
            }
            return params;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = getQueryParams();
            
            // Set Language
            if (params.lang && mobileTranslations[params.lang]) {
                currentLang = params.lang;
            }

            // Apply translations
            const trans = mobileTranslations[currentLang];
            document.getElementById('lbl-tech').textContent = trans["lbl-tech"];
            document.getElementById('lbl-address').textContent = trans["lbl-address"];
            document.getElementById('lbl-pay').innerHTML = `$${params.pay || '0'} <span style="font-size: 0.9rem; color: #94a3b8; font-weight: 400;">USD</span>`;
            document.getElementById('lbl-desc').textContent = trans["lbl-desc"];
            document.getElementById('lbl-upload').textContent = trans["lbl-upload"];
            document.getElementById('lbl-choose').textContent = trans["lbl-choose"];
            
            const btnStart = document.getElementById('btn-start-job');
            const btnComplete = document.getElementById('btn-complete-job');
            
            btnStart.textContent = trans["btn-start"];
            btnComplete.textContent = trans["btn-complete"];

            // Apply data values from URL parameters
            document.getElementById('val-tech').textContent = params.tech || 'Technician';
            const fullAddress = params.address || 'Atlanta, GA';
            document.getElementById('val-address').textContent = fullAddress;
            document.getElementById('val-desc').textContent = params.desc || 'No details provided';

            // Google Maps Link
            const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}`;
            document.getElementById('gmaps-link').href = gmapsUrl;

            // Waze GPS Link
            const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(fullAddress)}`;
            document.getElementById('waze-link').href = wazeUrl;

            // Flow Status Logic
            const statusBadge = document.getElementById('tech-status');
            statusBadge.textContent = trans["status-pending"];

            const uploadPanel = document.getElementById('upload-panel');

            // Click start job
            btnStart.addEventListener('click', () => {
                statusBadge.textContent = trans["status-progress"];
                statusBadge.className = 'status-badge in-progress';
                btnStart.style.display = 'none';
                btnComplete.style.display = 'block';
                uploadPanel.style.display = 'flex';
                alert(trans["alert-started"]);
            });

            // Photo upload thumbnail preview logic
            const photoInput = document.getElementById('tech-photos');
            const previewsContainer = document.getElementById('tech-photo-previews');
            
            if (photoInput && previewsContainer) {
                photoInput.addEventListener('change', (e) => {
                    previewsContainer.innerHTML = '';
                    if (e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = document.createElement('img');
                                img.src = event.target.result;
                                img.className = 'thumbnail';
                                previewsContainer.appendChild(img);
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                });
            }

            // Click complete job
            btnComplete.addEventListener('click', () => {
                // Require photo upload simulation
                if (photoInput.files.length === 0) {
                    alert(currentLang === 'es' ? 'Por favor, toma al menos una foto del trabajo terminado.' : 'Please take at least one photo of the completed work.');
                    return;
                }

                statusBadge.textContent = trans["status-completed"];
                statusBadge.className = 'status-badge completed';
                btnComplete.style.display = 'none';
                uploadPanel.style.display = 'none';
                alert(trans["alert-completed"]);
            });
        });
    </script>
</body>
</html>
